resources:
  pipelines:
    pipeline_cdc_customer_bronze:
      name: "cdc_customer_bronze_dlt"

      configuration:
        # Runtime parameters available inside notebook as spark.conf.get()
        pipeline_name:     "cdc_customer_bronze_dlt"
        raw_source_path:   "/mnt/raw/customer_updates/"
        checkpoint_path:   "/mnt/checkpoints/bronze/customer_cdc/"
        schema_hints_path: "/mnt/schema_hints/customer_cdc/"
        bronze_catalog:    ${bundle.variables.catalog}
        bronze_schema:     bronze

      clusters:
        - label: default
          node_type_id: Standard_DS4_v2
          driver_node_type_id: Standard_DS4_v2
          autoscale:
            min_workers: 1
            max_workers: 3
            mode: ENHANCED

      libraries:
        - notebook:
            path: /Repos/sachinkumarbhandari4/Medallion_Assesment/cdc_medallion_pipeline/src/bronze/bronze_ingestion

      # Write into the bronze schema of the target catalog
      target: bronze
      catalog: ${bundle.variables.catalog}
      data_sampling: false

      # Continuous mode keeps Auto Loader stream alive
      continuous: true
