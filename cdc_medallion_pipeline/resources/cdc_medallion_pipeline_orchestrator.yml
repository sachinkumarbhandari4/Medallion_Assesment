resources:
  jobs:
    job_cdc_medallion_pipeline:
      name: "cdc_medallion_pipeline_orchestrator"

      # Schedule: run every hour
      schedule:
        quartz_cron_expression: "0 0 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED

      # -- Email alerts -----------------------------------------------------
      email_notifications:
        on_failure:
          - ${workspace.current_user.userName}

      # -- Tasks run sequentially: Bronze → Silver → Gold -------------------
      tasks:

        - task_key: bronze_ingestion
          description: "Trigger Bronze Auto Loader DLT pipeline"
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_cdc_customer_bronze.id}
            full_refresh: false

        - task_key: silver_transformation
          description: "Cleanse, deduplicate and validate CDC events"
          depends_on:
            - task_key: bronze_ingestion
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_cdc_customer_silver.id}
            full_refresh: false

        - task_key: gold_scd_merge
          description: "Apply SCD Type 2 merge into Customer Dimension"
          depends_on:
            - task_key: silver_transformation
          pipeline_task:
            pipeline_id: ${resources.pipelines.pipeline_cdc_customer_gold.id}
            full_refresh: false

      # -- Job-level cluster (used if tasks don't specify their own) ---------
      job_clusters:
        - job_cluster_key: shared_job_cluster
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: Standard_DS4_v2
            autoscale:
              min_workers: 1
              max_workers: 4
